name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Build
              working-directory: frontend
              run: npm run build

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      frontend/main.js
                      frontend/manifest.json
                  generate_release_notes: true
                  draft: false
                  prerelease: false